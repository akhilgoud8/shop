# /etc/nginx/sites-available/shopzen
#
# Deploy this on the FRONTEND EC2 instance.
# It serves the static frontend files directly, and reverse-proxies every
# /api/* request to the BACKEND EC2 instance running Gunicorn+Flask.
#
# Why reverse-proxy instead of calling the backend from the browser
# directly? Because it puts the frontend and the API on the SAME origin
# (from the browser's point of view), which means:
#   1. No CORS configuration needed at all.
#   2. The Flask session cookie (used for login) just works, since
#      cookies are scoped per-origin.
#
# Replace <BACKEND_PRIVATE_IP> below with your backend EC2's PRIVATE IP
# (not public IP) if both instances are in the same VPC -- keeps traffic
# off the public internet and avoids data-transfer charges. Replace
# <YOUR_DOMAIN_OR_PUBLIC_IP> with your actual domain name or the
# frontend EC2's public IP / load balancer DNS name.

server {
    listen 80;
    server_name <YOUR_DOMAIN_OR_PUBLIC_IP>;

    # Root of the deployed frontend/ folder, e.g. after:
    #   scp -r frontend ec2-user@<frontend-ip>:/var/www/shopzen/
    root /var/www/shopzen;
    index index.html;

    # Serve "/" directly (200, not a redirect) -- this matters if you put
    # a load balancer health check on "/", since a redirect there would
    # cause the health check to fail.
    location = / {
        try_files /frontend/main/index.html =404;
    }

    # All category pages + their style.css / script.js / scan.jpg assets.
    # Every internal link in the frontend already uses absolute
    # "/frontend/<category>/..." paths, so this one location block covers
    # every page and every asset.
    location /frontend/ {
        try_files $uri $uri/ =404;
    }

    # Reverse proxy: forward every /api/* request to the backend EC2.
    location /api/ {
        proxy_pass http://<BACKEND_PRIVATE_IP>:5000/api/;
        proxy_http_version 1.1;

        # Preserve the real client info and protocol for the backend's logs
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Required so the Flask session cookie set by the backend is
        # correctly scoped back to this (frontend) origin.
        proxy_cookie_path / /;

        # Reasonable timeouts -- raise if your email-sending endpoint
        # (checkout/login) is slow; email itself is sent on a background
        # thread in app.py so this should rarely matter.
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }

    # Optional: lightweight access/error logs specific to this vhost
    access_log /var/log/nginx/shopzen.access.log;
    error_log  /var/log/nginx/shopzen.error.log;
}
